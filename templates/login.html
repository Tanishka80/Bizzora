{% extends "base.html" %}

{% block title %}Login - Bizzora{% endblock %}

{% block content %}
<main style="display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 20px;">
    <div class="glass-card" style="width: 100%; max-width: 400px; padding: 40px;">
        <h2 style="text-align: center; margin-bottom: 30px; font-size: 2rem;">Sign In</h2>
        <form action="{{ url_for('login') }}" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Email Address</label>
                <input type="email" name="email" required
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white; outline: none;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Password</label>
                <input type="password" name="password" required
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white; outline: none;">
            </div>
            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 12px; font-size: 1.1rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 24px; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}"
                style="color: var(--primary); text-decoration: none;">Register here</a>
        </p>
    </div>
</main>
{% endblock %}
