{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
<div class="auth-wrapper pt-0">
    <div class="card" style="width: 100%; max-width: 600px; margin: 0 auto;">
        <h2 class="text-primary mb-2">Publish New Product</h2>
        <p class="text-muted mb-4">Fill out details for the new product you want to list.</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label class="form-label">Product Title</label>
                <input type="text" name="title" class="form-control" placeholder="E.g., High-Quality Cotton T-Shirt" required>
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" placeholder="Provide clear details about the product..."
                    rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Price (₹)</label>
                <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label class="form-label">Product Image</label>
                <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block mt-3">Publish Product</button>
        </form>
    </div>
</div>
{% endblock %}
