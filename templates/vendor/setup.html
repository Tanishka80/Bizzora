{% extends "base.html" %}
{% block title %}Setup Your Business{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Complete Your Business Profile</h2>
    <p style="color: #9ca3af; margin-bottom: 20px;">Please provide the following details to register your shop.</p>

    <form method="POST" enctype="multipart/form-data">
        <label>Personal & Background</label>
        <input type="text" name="seller_name" class="form-control" placeholder="Seller Full Name" required>
        <input type="text" name="aadhar_number" class="form-control" placeholder="Aadhar Number" required>
        <textarea name="family_background" class="form-control" placeholder="Brief Name & Family Background check info"
            rows="3" required></textarea>

        <label style="margin-top: 15px; display: block;">Business Legal Info</label>
        <input type="text" name="business_name" class="form-control" placeholder="Business Title" required>
        <textarea name="description" class="form-control" placeholder="Business Description" rows="4"
            required></textarea>
        <input type="text" name="gst_number" class="form-control" placeholder="GST Number (Optional)">
        <input type="text" name="msme_registration" class="form-control"
            placeholder="MSME Registration Info (Optional)">

        <label style="margin-top: 15px; display: block;">Business Identity</label>
        <p style="font-size: 0.9em; margin-bottom: 5px;">Business Logo</p>
        <input type="file" name="logo" class="form-control" accept="image/*">

        <p style="font-size: 0.9em; margin-bottom: 5px;">Banner Image</p>
        <input type="file" name="banner" class="form-control" accept="image/*">

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Submit for
            Verification</button>
    </form>
</div>
{% endblock %}
