{% extends "base.html" %}

{% block title %}Register - Bizzora{% endblock %}

{% block content %}
<main class="auth-wrapper">
    <div class="auth-card">
        <h2>Create Account</h2>
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" required class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" required class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" required class="form-control">
            </div>
            <div class="form-group">
                <label class="form-label">Join As</label>
                <select name="role" class="form-control" style="appearance: auto;">
                    <option value="customer">Customer (Shop Local)</option>
                    <option value="vendor">Vendor (Sell Local)</option>
                </select>
            </div>

            <div id="vendor-fields"
                style="display: none; background: var(--brand-cream-2); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-soft);">
                <h4 class="text-primary mb-3">Business Profile Setup</h4>
                <div class="form-group">
                    <label class="form-label">Business Name</label>
                    <input type="text" name="business_name" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">GST Number / Registration</label>
                    <input type="text" name="gst_number" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Business Address/Location</label>
                    <input type="text" name="business_address" class="form-control">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <p class="text-center mt-3 text-muted">
            Already have an account? <a href="{{ url_for('login') }}" class="text-primary" style="font-weight: 500; text-decoration: none;">Sign In</a>
        </p>
    </div>
</main>
<script>
    document.querySelector('select[name="role"]').addEventListener('change', function (e) {
        document.getElementById('vendor-fields').style.display = (e.target.value === 'vendor') ? 'block' : 'none';
    });
</script>
{% endblock %}
