{% extends "base.html" %}

{% block title %}Register - Bizzora{% endblock %}

{% block content %}
<main style="display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 20px;">
    <div class="glass-card" style="width: 100%; max-width: 500px; padding: 40px;">
        <h2 style="text-align: center; margin-bottom: 30px; font-size: 2rem;">Create Account</h2>
        <form action="{{ url_for('register') }}" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Username</label>
                <input type="text" name="username" required
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white; outline: none;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Email Address</label>
                <input type="email" name="email" required
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white; outline: none;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Password</label>
                <input type="password" name="password" required
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white; outline: none;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Join As</label>
                <select name="role"
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white; outline: none; appearance: none;">
                    <option value="customer">Customer (Shop Local)</option>
                    <option value="vendor">Vendor (Sell Local)</option>
                </select>
            </div>

            <div id="vendor-fields"
                style="display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <h4 style="margin-top: 0; margin-bottom: 15px; color: var(--accent);">Business Profile Setup</h4>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Business Name</label>
                    <input type="text" name="business_name"
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">GST Number /
                        Registration</label>
                    <input type="text" name="gst_number"
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-muted);">Business
                        Address/Location</label>
                    <input type="text" name="business_address"
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.5); color: white;">
                </div>
            </div>
            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 12px; font-size: 1.1rem;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 24px; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}"
                style="color: var(--primary); text-decoration: none;">Sign In</a>
        </p>
    </div>
</main>
<script>
    document.querySelector('select[name="role"]').addEventListener('change', function (e) {
        document.getElementById('vendor-fields').style.display = (e.target.value === 'vendor') ? 'block' : 'none';
    });
</script>
{% endblock %}
